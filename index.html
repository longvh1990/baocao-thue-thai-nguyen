<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BÁO CÁO THỰC HIỆN THU NSNN - THÁI NGUYÊN</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* Giữ nguyên style cũ của bạn, tôi không thay đổi để tiết kiệm chỗ */
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f0f4f8; margin:0; padding:20px; color:#2d3748; }
        .container { max-width:1480px; margin:0 auto; background:white; border-radius:10px; box-shadow:0 6px 24px rgba(0,0,0,0.08); overflow:hidden; }
        header { background:linear-gradient(135deg,#1e40af,#3b82f6); color:white; padding:24px; text-align:center; }
        header h1 { margin:0; font-size:26px; }
        .info, .controls, .login-box, .note { /* giữ nguyên */ }
        /* ... các style khác giữ nguyên ... */
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>THUẾ TỈNH THÁI NGUYÊN</h1>
        <h1>BÁO CÁO THỰC HIỆN THU NSNN</h1>
        <p style="margin:8px 0 0;">Tính đến ngày <span id="report-date" style="font-weight:700;"></span></p>
    </header>

    <div class="login-box">
        <label><strong>Chế độ:</strong></label>
        <input type="email" id="adminEmail" placeholder="Email admin" style="padding:8px; width:220px;">
        <input type="password" id="adminPass" placeholder="Mật khẩu" style="padding:8px; width:200px;">
        <button class="btn-primary" onclick="loginAdmin()">Đăng nhập Admin</button>
        <button class="btn-danger" onclick="logoutAdmin()">Thoát Admin</button>
        <span id="adminStatus" style="font-weight:600; margin-left:16px;"></span>
    </div>

    <div class="info">
        <div><strong>ĐVT:</strong> Triệu đồng</div>
        <div><strong>Năm ngân sách:</strong> 2026</div>
        <div>
            <strong>Xem dữ liệu ngày báo cáo:</strong>
            <select id="historyDate" onchange="loadDataByDate(this.value)"></select>
        </div>
    </div>

    <div class="controls">
        <button class="btn-success" onclick="exportToExcel()">📤 Export Excel</button>
        <input type="file" id="fileInput" accept=".xls,.xlsx" style="display:none" onchange="handleImport(event)">
        <button class="btn-primary" id="btnImport" onclick="document.getElementById('fileInput').click()">📥 Import từ Excel</button>
    </div>

    <table id="dataTable">
        <thead>
            <tr>
                <th>TT</th>
                <th>Chỉ tiêu</th>
                <th>Dự toán<br>Chính phủ</th>
                <th>Dự toán<br>tỉnh</th>
                <th>Thực hiện</th>
                <th>% CP</th>
                <th>% tỉnh</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="note">
        <strong>Hướng dẫn sử dụng:</strong><br>
        • Đăng nhập bằng tài khoản admin để cập nhật dữ liệu.<br>
    </div>
</div>

<script>
// ====================== CẤU HÌNH SUPABASE ======================
const SUPABASE_URL = 'https://bsyqklmoorafermypoyj.supabase.co';          
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzeXFrbG1vb3JhZmVybXlwb3lqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyNzQ1NzMsImV4cCI6MjA4ODg1MDU3M30.wm6P171WQnaIMKB1FJEh1OPeDc75cI3VHuk-ASDRooo'; 
const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let isAdmin = false;
let currentDateKey = "";
let treeData = [];

// ====================== DỮ LIỆU MẪU BAN ĐẦU ======================
function resetTreeData() {
    treeData = [
        { id:"A", tt:"A", chi_tieu:"Tổng thu toàn tỉnh (I+II+III)", level:0, parent:null, govt:26545000, prov:26560000, actual:5998273, expanded:true },
        { id:"I", tt:"I", chi_tieu:"Thu nội địa", level:1, parent:"A", govt:23595000, prov:23595000, actual:5408805, expanded:true },
        { id:"III", tt:"III", chi_tieu:"Thu từ Hải quan", level:1, parent:"A", govt:2950000, prov:2950000, actual:497426, expanded:true }
    ];
}

// ====================== NGÀY & ĐỊNH DẠNG ======================
function getYesterdayKey() {
    const d = new Date();
    d.setDate(d.getDate() - 1);
    return d.toISOString().slice(0,10);
}

function formatDateVN(key) {
    if (!key) return "";
    const [y, m, d] = key.split('-');
    return `${d}/${m}/${y}`;
}

// ====================== ADMIN AUTH (Supabase) ======================
async function loginAdmin() {
    const email = document.getElementById("adminEmail").value.trim();
    const password = document.getElementById("adminPass").value.trim();

    if (!email || !password) return alert("Vui lòng nhập email và mật khẩu!");

    const { data, error } = await supabase.auth.signInWithPassword({ email, password });

    if (error) {
        alert("Đăng nhập thất bại: " + error.message);
        return;
    }

    isAdmin = true;
    document.getElementById("adminStatus").innerHTML = `<span style="color:#15803d;">✓ Admin: ${data.user.email}</span>`;
    enableEditMode();
    alert("Đăng nhập thành công!");
}

async function logoutAdmin() {
    await supabase.auth.signOut();
    isAdmin = false;
    document.getElementById("adminStatus").innerHTML = "";
    disableEditMode();
    alert("Đã thoát chế độ Admin.");
}

async function checkAdminSession() {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        isAdmin = true;
        document.getElementById("adminStatus").innerHTML = `<span style="color:#15803d;">✓ Admin: ${session.user.email} (tự động)</span>`;
        enableEditMode();
    }
}

// ====================== ENABLE/DISABLE EDIT MODE ======================
function enableEditMode() {
    document.querySelectorAll(".contenteditable").forEach(td => {
        td.contentEditable = true;
    });
    document.getElementById("btnImport").disabled = false;
}

function disableEditMode() {
    document.querySelectorAll(".contenteditable").forEach(td => {
        td.contentEditable = false;
    });
    document.getElementById("btnImport").disabled = true;
}

// ====================== LƯU / TẢI DỮ LIỆU TỪ SUPABASE ======================
async function saveCurrentData() {
    if (!isAdmin || !currentDateKey) return;

    const { error } = await supabase
        .from('reports')
        .upsert({
            date_key: currentDateKey,
            data_json: treeData,
            updated_at: new Date().toISOString()
        }, { onConflict: 'date_key' });

    if (error) console.error("Lỗi lưu Supabase:", error);
}

async function loadDataByDate(dateKey) {
    if (!dateKey) dateKey = getYesterdayKey();
    currentDateKey = dateKey;

    const { data, error } = await supabase
        .from('reports')
        .select('data_json')
        .eq('date_key', dateKey)
        .maybeSingle();

    if (error) console.error("Lỗi load:", error);

    if (data?.data_json) {
        treeData = data.data_json;
    } else {
        resetTreeData();
    }

    document.getElementById("report-date").textContent = formatDateVN(dateKey);
    renderTable();
}

async function loadHistoryDates() {
    const { data, error } = await supabase
        .from('reports')
        .select('date_key')
        .order('date_key', { ascending: false });

    if (error || !data) {
        // fallback nếu chưa có dữ liệu
        const defDate = getYesterdayKey();
        document.getElementById("historyDate").innerHTML = `<option value="${defDate}" selected>Tính đến ngày ${formatDateVN(defDate)}</option>`;
        loadDataByDate(defDate);
        return;
    }

    const sel = document.getElementById("historyDate");
    sel.innerHTML = "";
    data.forEach(row => {
        const opt = document.createElement("option");
        opt.value = row.date_key;
        opt.text = `Tính đến ngày ${formatDateVN(row.date_key)}`;
        sel.appendChild(opt);
    });

    if (data.length > 0) {
        sel.value = data[0].date_key;
        loadDataByDate(data[0].date_key);
    }
}

// ====================== RENDER TABLE (giữ nguyên) ======================
function renderTable() {
    const tbody = document.querySelector("#dataTable tbody");
    tbody.innerHTML = "";
    treeData.filter(r => !r.parent).forEach(node => renderNode(node, tbody, 0));
}

function renderNode(node, tbody, depth) {
    const tr = document.createElement("tr");
    tr.className = `level-${node.level}`;

    const tdTT = document.createElement("td"); tdTT.textContent = node.tt || ""; tr.appendChild(tdTT);

    const tdChi = document.createElement("td");
    tdChi.style.paddingLeft = `${depth*30 + 15}px`;
    const hasChild = treeData.some(r => r.parent === node.id);
    if (hasChild) {
        tdChi.innerHTML = `<strong>${node.chi_tieu}</strong> ${node.expanded ? '▼' : '▶'}`;
        tdChi.style.cursor = "pointer";
        tdChi.onclick = () => { node.expanded = !node.expanded; renderTable(); };
    } else {
        tdChi.textContent = node.chi_tieu;
    }
    tr.appendChild(tdChi);

    tr.appendChild(createCell(node.govt, "govt", node));
    tr.appendChild(createCell(node.prov, "prov", node));
    tr.appendChild(createCell(node.actual, "actual", node));

    const tdCP = document.createElement("td"); tdCP.className="percent";
    tdCP.textContent = node.govt ? (node.actual / node.govt * 100).toFixed(1) + "%" : "—";
    tr.appendChild(tdCP);

    const tdProv = document.createElement("td"); tdProv.className="percent";
    tdProv.textContent = node.prov ? (node.actual / node.prov * 100).toFixed(1) + "%" : "—";
    tr.appendChild(tdProv);

    tbody.appendChild(tr);

    if (node.expanded) {
        treeData.filter(r => r.parent === node.id).forEach(c => renderNode(c, tbody, depth+1));
    }
}

function createCell(val, field, node) {
    const td = document.createElement("td");
    td.textContent = val.toLocaleString("vi-VN");
    td.className = "contenteditable";

    if (isAdmin) {
        td.contentEditable = true;
        td.onblur = function() {
			let raw = this.textContent.replace(/[^0-9.-]/g, "");
			node[field] = parseFloat(raw) || 0;
			if (field === "actual" && isAdmin) {
        saveCurrentData();  
    }
    renderTable();
};
    }
    return td;
}
// ====================== IMPORT EXCEL ======================
function handleImport(e) {
    if (!isAdmin) return alert("Chỉ Admin mới được import!");
  
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const data = new Uint8Array(ev.target.result);
            const wb = XLSX.read(data, {type:"array"});
            const ws = wb.Sheets[wb.SheetNames[0]];
            const json = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});

            let updated = 0;
            let notFound = [];

            json.forEach((row, idx) => {
                if (idx < 5) return; // bỏ header
                if (!row[1]) return;

                let name = (row[1] || "").toString().trim().replace(/\s+/g, " ");
                if (!name) return;

                const match = treeData.find(r => {
                    let cleanChi = r.chi_tieu.trim().replace(/\s+/g, " ");
                    return cleanChi === name ||
                           cleanChi.includes(name) ||
                           name.includes(cleanChi) ||
                           (name.startsWith("- ") && cleanChi.startsWith("- ") && name.slice(2).trim() === cleanChi.slice(2).trim());
                });

                if (match) {
                    match.govt   = parseFloat((row[2]||"").toString().replace(/[^0-9.-]/g,"")) || 0;
                    match.prov   = parseFloat((row[3]||"").toString().replace(/[^0-9.-]/g,"")) || 0;
                    match.actual = parseFloat((row[4]||"").toString().replace(/[^0-9.-]/g,"")) || 0;
                    updated++;
                } else {
                    notFound.push(name);
                }
            });

            saveCurrentData();
            renderTable();

            let msg = `Import hoàn tất: cập nhật ${updated} dòng.\n`;
            if (notFound.length > 0) {
                msg += `Không tìm thấy:\n` + notFound.slice(0,10).join("\n") + (notFound.length>10 ? "\n...và " + (notFound.length-10) + " dòng khác" : "");
            }
            alert(msg);
        } catch(err) {
            alert("Lỗi khi đọc file Excel: " + err.message);
        }
    };
    reader.readAsArrayBuffer(file);
}
// ====================== EXPORT EXCEL (giữ nguyên) ======================
function exportToExcel() {
    const rows = [["TT","Chỉ tiêu","Dự toán CP","Dự toán tỉnh","Thực hiện","% CP","% tỉnh"]];
    function addRow(node, depth=0) {
        rows.push([
            node.tt || "",
            "  ".repeat(depth) + node.chi_tieu,
            node.govt,
            node.prov,
            node.actual,
            node.govt ? (node.actual/node.govt*100).toFixed(1)+"%" : "—",
            node.prov ? (node.actual/node.prov*100).toFixed(1)+"%" : "—"
        ]);
        if (node.expanded) treeData.filter(r=>r.parent===node.id).forEach(c=>addRow(c,depth+1));
    }
    treeData.filter(r=>!r.parent).forEach(n=>addRow(n));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(rows), "BaoCao");
    XLSX.writeFile(wb, `BaoCao_NSNN_ThaiNguyen_${currentDateKey || "latest"}.xlsx`);
}

// ====================== KHỞI ĐỘNG ======================
window.onload = async function() {
    await checkAdminSession();
    await loadHistoryDates();
    renderTable(); // render lần đầu
};
</script>
</body>
</html>
